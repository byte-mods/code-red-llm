<script type="text/javascript">
  RED.nodes.registerType('mongodb', {
    category: 'storage',
    color: '#a8e0a0',
    paletteLabel: 'mongodb',
    defaults: {
      name: { value: '' },
      uri: { value: 'mongodb://localhost:27017' },
      database: { value: '' },
      collection: { value: '' },
      operation: { value: 'find' },
    },
    inputs: 1,
    outputs: 1,
    icon: 'db.svg',
    label: function () { return this.name || ('mongo ' + (this.operation || 'find')); },
  });
</script>

    <input type="text" id="node-input-uri" placeholder="mongodb://localhost:27017">

  <div class="form-row">
    <label for="node-input-database"><i class="fa fa-database"></i> Database</label>
    <input type="text" id="node-input-database">
  </div>

    <label for="node-input-collection"><i class="fa fa-folder"></i> Collection</label>
