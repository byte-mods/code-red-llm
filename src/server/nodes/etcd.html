<script type="text/javascript">
  RED.nodes.registerType('etcd', {
    category: 'storage', color: '#9dd9c5', paletteLabel: 'etcd',
    defaults: { name: { value: '' }, hosts: { value: 'localhost:2379' }, operation: { value: 'get' } },
    inputs: 1, outputs: 1, icon: 'db.svg',
    label: function () { return this.name || ('etcd ' + (this.operation || 'get')); },
  });
</script>
<script type="text/html" data-template-name="etcd">
  <div class="form-row"><label for="node-input-name"><i class="fa fa-tag"></i> Name</label><input type="text" id="node-input-name"></div>
  <div class="form-row"><label for="node-input-hosts"><i class="fa fa-server"></i> Hosts</label><input type="text" id="node-input-hosts" placeholder="h1:2379,h2:2379"></div>
  <div class="form-row"><label for="node-input-operation"><i class="fa fa-cog"></i> Op</label>
    <select id="node-input-operation"><option value="get">get</option><option value="put">put</option><option value="delete">delete</option></select>
  </div>
</script>
<script type="text/html" data-help-name="etcd"><p>etcd v3 KV ops. <code>msg.key</code> always required; <code>msg.value</code> for put.</p></script>
