<script type="text/javascript">
  RED.nodes.registerType('pattern-match', {
    category: 'function', color: '#d0c4f0', paletteLabel: 'pattern-match',
    defaults: {
      name: { value: '' }, sequence: { value: '' }, keyField: { value: 'key' },
      eventField: { value: '' }, windowMs: { value: 60000 },
    },
    inputs: 1, outputs: 1, icon: 'function.svg',
    label: function () { return this.name || ('pattern ' + (this.sequence || '?')); },
  });
</script>
<script type="text/html" data-template-name="pattern-match">
  <div class="form-row"><label for="node-input-name"><i class="fa fa-tag"></i> Name</label><input type="text" id="node-input-name"></div>
  <div class="form-row"><label for="node-input-sequence"><i class="fa fa-list-ol"></i> Sequence</label><input type="text" id="node-input-sequence" placeholder="login,view-cart,checkout"></div>
  <div class="form-row"><label for="node-input-keyField"><i class="fa fa-key"></i> Key field</label><input type="text" id="node-input-keyField"></div>
  <div class="form-row"><label for="node-input-eventField"><i class="fa fa-tag"></i> Event field</label><input type="text" id="node-input-eventField" placeholder="(in msg.payload, blank → payload itself)"></div>
  <div class="form-row"><label for="node-input-windowMs"><i class="fa fa-clock-o"></i> Window ms</label><input type="number" id="node-input-windowMs"></div>
</script>
<script type="text/html" data-help-name="pattern-match"><p>Match a CSV sequence of event names per key within a time window. Emits the full chain on match.</p></script>
