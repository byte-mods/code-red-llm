<script type="text/javascript">
  RED.nodes.registerType('oraclesql', {
    category: 'storage',
    color: '#f08080',
    paletteLabel: 'oraclesql',
    defaults: {
      name: { value: '' },
      connectString: { value: '', required: true },
      user: { value: '', required: true },
      password: { value: '', required: true },
      query: { value: '' },
    },
    inputs: 1,
    outputs: 1,
    icon: 'db.svg',
    label: function () { return this.name || 'oraclesql'; },
  });
</script>
<script type="text/html" data-template-name="oraclesql">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="oraclesql">
  </div>
  <div class="form-row">
    <label for="node-input-connectString"><i class="fa fa-link"></i> Connect</label>
    <input type="text" id="node-input-connectString" placeholder="host:1521/SERVICE">
  </div>
  <div class="form-row">
    <label for="node-input-user"><i class="fa fa-user"></i> User</label>
    <input type="text" id="node-input-user">
  </div>
  <div class="form-row">
    <label for="node-input-password"><i class="fa fa-lock"></i> Password</label>
    <input type="password" id="node-input-password">
  </div>
  <div class="form-row">
    <label for="node-input-query" style="vertical-align: top"><i class="fa fa-code"></i> Default SQL</label>
    <textarea id="node-input-query" rows="4" style="width:70%"></textarea>
  </div>
</script>
<script type="text/html" data-help-name="oraclesql">
  <p>Runs SQL against Oracle Database. Requires Oracle Instant Client on the host (see node-oracledb docs).</p>
</script>
