<script type="text/javascript">
  RED.nodes.registerType('mariadb', {
    category: 'storage',
    color: '#e0a48a',
    paletteLabel: 'mariadb',
    defaults: {
      name: { value: '' },
      host: { value: 'localhost' },
      port: { value: 3306 },
      user: { value: '' },
      password: { value: '' },
      database: { value: '' },
      query: { value: '' },
    },
    inputs: 1,
    outputs: 1,
    icon: 'db.svg',
    label: function () { return this.name || 'mariadb'; },
  });
</script>
<script type="text/html" data-template-name="mariadb">
  <div class="form-row">

    <label for="node-input-user"><i class="fa fa-user"></i> User</label>
    <input type="text" id="node-input-user">

    <label for="node-input-password"><i class="fa fa-lock"></i> Password</label>
