<script type="text/javascript">
  RED.nodes.registerType('clickhouse', {
    category: 'storage',
    color: '#fee87f',
    paletteLabel: 'clickhouse',
    defaults: {
      name: { value: '' },
      url: { value: 'http://localhost:8123' },
      username: { value: '' },
      password: { value: '' },
      database: { value: '' },
      query: { value: '' },
      operation: { value: 'query' },
    },
    inputs: 1,
    outputs: 1,
    icon: 'db.svg',
    label: function () { return this.name || 'clickhouse'; },
  });
</script>
<script type="text/html" data-template-name="clickhouse">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="clickhouse">
  </div>
  <div class="form-row">
    <label for="node-input-url"><i class="fa fa-link"></i> URL</label>
    <input type="text" id="node-input-url" placeholder="http://localhost:8123">
  </div>
  <div class="form-row">
    <label for="node-input-username"><i class="fa fa-user"></i> User</label>
    <input type="text" id="node-input-username">
  </div>
  <div class="form-row">
    <label for="node-input-password"><i class="fa fa-lock"></i> Password</label>
    <input type="password" id="node-input-password">
  </div>
  <div class="form-row">
    <label for="node-input-database"><i class="fa fa-database"></i> Database</label>
    <input type="text" id="node-input-database">
  </div>
  <div class="form-row">
    <label for="node-input-operation"><i class="fa fa-cog"></i> Operation</label>
    <select id="node-input-operation">
      <option value="query">query</option>
      <option value="insert">insert</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-query" style="vertical-align: top"><i class="fa fa-code"></i> Default SQL</label>
    <textarea id="node-input-query" rows="4" style="width:70%"></textarea>
  </div>
</script>
<script type="text/html" data-help-name="clickhouse">
  <p>Runs queries or row-batch inserts against ClickHouse over HTTP.</p>
</script>
