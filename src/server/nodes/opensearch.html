<script type="text/javascript">

    category: 'storage',
    color: '#a8d4fc',
    paletteLabel: 'opensearch',
    defaults: {
      name: { value: '' }, node: { value: 'http://localhost:9200' },
      username: { value: '' }, password: { value: '' },
      index: { value: '' }, operation: { value: 'search' },
